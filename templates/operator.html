<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Café Barista — Drive-Thru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="logo">Café Barista · Drive-Thru</h1>
            <span class="status" id="status">En línea</span>
        </header>

        <section class="camera-panel" aria-label="Cámara y modo de detección">
            <div class="camera-panel-row">
                <div class="camera-preview-box">
                    <img id="cameraPreviewImg" class="camera-preview-img" alt="Vista previa de la cámara" width="320" height="240" hidden>
                    <p class="camera-preview-placeholder" id="cameraPreviewPlaceholder">Vista previa solo en modo cámara real</p>
                </div>
                <div class="camera-panel-actions">
                    <p class="camera-mode-label" id="cameraModeLabel">Modo: simulado</p>
                    <button type="button" class="btn btn-secondary" id="btnCameraToggle">Usar cámara real</button>
                </div>
            </div>
        </section>

        <main class="main">
            <div class="display-card" id="displayCard">
                <div class="greeting" id="greeting">Esperando cliente…</div>
                <button type="button" class="nickname-edit-btn" id="btnEditNickname" hidden aria-label="Cambiar nombre">✎ Cambiar nombre</button>
                <div class="plate-badge plate-badge--discrete" id="plateBadge"></div>
                <div class="order-hint" id="orderHint"></div>
            </div>

            <div class="action-panel" id="actionPanel" hidden>
                <div class="suggestion-actions" id="suggestionActions" hidden>
                    <button type="button" class="btn btn-same" id="btnSameOrder">Mismo pedido ✅</button>
                    <button type="button" class="btn btn-different" id="btnDifferentOrder">Otro pedido 🔄</button>
                </div>

                <div class="name-row" id="nameRow" hidden>
                    <label for="customerNameInput">¿Cómo te gusta que te llamen?</label>
                    <input type="text" id="customerNameInput" class="input-large" placeholder="Apodo" autocomplete="name" enterkeyhint="done">
                    <button type="button" class="btn btn-primary btn-block" id="btnSaveNickname">GUARDAR Y CONTINUAR</button>
                </div>

                <div class="menu-actions">
                    <button type="button" class="btn btn-menu" id="btnOpenMenu">Elegir del menú</button>
                </div>

                <div class="pending-bar" id="pendingBar" hidden>
                    <p class="pending-label" id="pendingLabel"></p>
                    <button type="button" class="btn btn-primary btn-block" id="btnConfirmVisit">Confirmar visita</button>
                </div>
            </div>

            <p class="error-toast" id="errorToast" hidden></p>

            <div class="controls">
                <div class="input-group">
                    <label for="plateInput">Placa manual</label>
                    <div class="input-row">
                        <input type="text" id="plateInput" placeholder="Ej: ABC123" maxlength="12" autocomplete="off" inputmode="text">
                        <button type="button" id="btnLookup" class="btn btn-primary">Aplicar</button>
                    </div>
                </div>
                <button type="button" id="btnSimulate" class="btn btn-secondary">Simular llegada</button>
            </div>
        </main>

        <div class="menu-backdrop" id="menuBackdrop" hidden aria-hidden="true"></div>
        <aside class="menu-sheet" id="menuSheet" role="dialog" aria-modal="true" aria-label="Menú" hidden aria-hidden="true">
            <div class="menu-sheet-head">
                <h2 class="menu-sheet-title">Menú</h2>
                <button type="button" class="btn-icon" id="btnCloseMenu" aria-label="Cerrar menú">✕</button>
            </div>
            <input type="search" id="menuFilter" class="menu-filter" placeholder="Buscar en el menú…" autocomplete="off">
            <div class="menu-body" id="menuBody"></div>
            <div class="menu-sheet-footer">
                <button type="button" class="btn-close-menu-footer" id="btnCloseMenuFooter">Cerrar menú</button>
            </div>
        </aside>

        <div class="modal-backdrop" id="nicknameModalBackdrop" hidden aria-hidden="true"></div>
        <section class="nickname-modal" id="nicknameModal" role="dialog" aria-modal="true" aria-label="Cambiar nombre" hidden aria-hidden="true">
            <h2>Cambiar nombre</h2>
            <input type="text" id="nicknameModalInput" class="input-large" placeholder="Nuevo apodo" autocomplete="name">
            <div class="nickname-modal-actions">
                <button type="button" class="btn btn-secondary" id="btnCancelNicknameModal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnSaveNicknameModal">Guardar</button>
            </div>
        </section>

        <footer class="footer">
            <span id="lastPlate"></span>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
